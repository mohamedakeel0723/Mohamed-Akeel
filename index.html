<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Nabisha ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #ff4d6d; --gold: #ffc300; --dark: #0c0002; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; overflow: hidden; height: 100vh; text-align: center; }
        .page { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; transition: 0.5s ease-in-out; padding: 20px; box-sizing: border-box; visibility: hidden; opacity: 0; }
        .active { visibility: visible; opacity: 1; }
        
        /* Heart Animation */
        .heart-container { position: relative; width: 150px; height: 150px; margin-top: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .heart-shape { background: var(--primary); width: 80px; height: 80px; position: absolute; transform: rotate(-45deg); animation: pulse 1.2s infinite; box-shadow: 0 0 30px var(--primary); pointer-events: none; }
        .heart-shape::before, .heart-shape::after { content: ""; width: 80px; height: 80px; background: var(--primary); border-radius: 50%; position: absolute; }
        .heart-shape::before { top: -40px; left: 0; } .heart-shape::after { left: 40px; top: 0; }
        .heart-text { position: relative; z-index: 10; font-weight: bold; font-size: 1.1rem; color: white; pointer-events: none; }

        @keyframes pulse { 0% { transform: rotate(-45deg) scale(1); } 50% { transform: rotate(-45deg) scale(1.1); } 100% { transform: rotate(-45deg) scale(1); } }

        /* Options and Buttons */
        .opt-container { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; margin-top: 25px; }
        .opt-btn { background: rgba(255,255,255,0.08); color: white; border: 1.5px solid var(--primary); padding: 15px; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .opt-btn.selected { background: var(--primary); border-color: white; transform: scale(1.05); }
        .next-btn { background: var(--gold); color: black; border: none; padding: 12px 45px; border-radius: 25px; font-weight: bold; margin-top: 35px; cursor: pointer; display: none; }
        .yes-btn, .no-btn { padding: 15px 45px; border-radius: 30px; border: none; font-size: 1.3rem; cursor: pointer; font-weight: bold; margin: 10px; }
        .yes-btn { background: #2ecc71; color: white; }
        .no-btn { background: #e74c3c; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <h1>Hi Nabisha... ✨</h1>
        <p>This website was specially created for you.<br>I want to know some things about you.</p>
        <div class="heart-container" onclick="showPage(2)">
            <div class="heart-shape"></div>
            <div class="heart-text">START</div>
        </div>
    </div>

    <div id="p2" class="page">
        <h2 id="questionText"></h2>
        <p style="font-size: 0.8rem; color: #aaa;">(ஒன்றுக்கும் மேற்பட்டவற்றைத் தேர்ந்தெடுக்கலாம்)</p>
        <div class="opt-container" id="optionsContainer"></div>
        <button id="nextBtn" class="next-btn" onclick="handleNext()">அடுத்த கேள்வி →</button>
    </div>

    <div id="p3" class="page">
        <h1 id="finalTitle">நபிஷா... <br> உங்களுக்கு என்னை பிடிச்சிருக்கா? 🫣</h1>
        <div id="finalBtns">
            <button class="yes-btn" onclick="sendFinal('Yes')">YES ❤️</button>
            <button class="no-btn" onclick="sendFinal('No')">NO 💔</button>
        </div>
        <h2 id="finalMsg" style="color: var(--gold); margin-top: 20px;"></h2>
    </div>

    <script>
        const questions = [
            { q: "ஸ்கூல்ல நீ என்னைப் பார்க்கும்போதெல்லாம், என்னைப் பத்தி உனக்கு என்ன தோணுச்சு?", opts: ["ரொம்பத் தொல்லை பண்றவன்னு தோணுச்சு! 😜", "இவன் ரொம்ப அமைதியான பையன்னு தோணுச்சு.", "ஒண்ணுமே தோணாது."] },
            { q: "என்கிட்ட உனக்கு பிடிச்ச விஷயம் எது?", opts: ["விடாமுயற்சி", "கியூட்டான குணம்", "சீக்ரெட்! 🤐"] },
            { q: "அடுத்து மீட் பண்ணும்போது நான் என்ன வாங்கிட்டு வரணும்?", opts: ["சாக்லேட்", "ரோஜாப் பூ", "உன் சிரிப்பு போதும் ❤️"] },
            { q: "நீ ஏன் என்கிட்ட பேசாம இருக்க?", opts: ["பயமா இருக்கு", "விருப்பம் இல்லை", "Future-ல பேசுவோம்"] }
        ];

        let currentQ = 0;
        let selectedOptions = [];
        let answersData = [];

        // EmailJS Initialization
        (function(){ 
            emailjs.init("uqurIOJ3nxZm_DIWY"); 
        })();

        function showPage(pageNum) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + pageNum).classList.add('active');
            if(pageNum === 2) loadQuestion();
        }

        function loadQuestion() {
            selectedOptions = [];
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.style.display = 'none';
            document.getElementById('questionText').innerText = questions[currentQ].q;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            questions[currentQ].opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = function() {
                    this.classList.toggle('selected');
                    if (this.classList.contains('selected')) {
                        selectedOptions.push(this.innerText);
                    } else {
                        selectedOptions = selectedOptions.filter(i => i !== this.innerText);
                    }
                    nextBtn.style.display = selectedOptions.length > 0 ? 'block' : 'none';
                };
                container.appendChild(btn);
            });
        }

        function handleNext() {
            answersData.push(`${questions[currentQ].q}: ${selectedOptions.join(", ")}`);
            currentQ++;
            if(currentQ < questions.length) loadQuestion();
            else showPage(3);
        }

        function sendFinal(choice) {
            answersData.push("Final Answer: " + choice);
            document.getElementById('finalBtns').classList.add('hidden');
            
            // Your IDs: service_g8uqvti, template_3lp7ulo
            emailjs.send("service_g8uqvti", "template_3lp7ulo", {
                message: answersData.join("\n")
            }).then(function(res) {
                console.log("Success!");
            }, function(err) {
                console.log("Error!");
            });
            
            document.getElementById('finalMsg').innerText = choice === 'Yes' ? "மிகவும் மகிழ்ச்சி! ❤️🎉" : "இருந்தாலும் பரவாயில்லை! ✨";
            if(choice === 'Yes') confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
