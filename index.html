<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Nabisha ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #ff4d6d; --g: #ffc300; --d: #0c0002; }
        body { margin: 0; font-family: sans-serif; background: var(--d); color: white; text-align: center; overflow: hidden; height: 100vh; }
        .page { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; transition: 0.5s; visibility: hidden; opacity: 0; padding: 20px; box-sizing: border-box; }
        .active { visibility: visible; opacity: 1; }
        .heart { background: var(--p); width: 80px; height: 80px; position: relative; transform: rotate(-45deg); animation: pulse 1.2s infinite; box-shadow: 0 0 20px var(--p); cursor: pointer; margin-top: 20px; }
        .heart::before, .heart::after { content: ""; width: 80px; height: 80px; background: var(--p); border-radius: 50%; position: absolute; }
        .heart::before { top: -40px; left: 0; } .heart::after { left: 40px; top: 0; }
        @keyframes pulse { 0%, 100% { transform: rotate(-45deg) scale(1); } 50% { transform: rotate(-45deg) scale(1.1); } }
        .opt-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--p); padding: 15px; margin: 5px; border-radius: 10px; width: 100%; max-width: 300px; cursor: pointer; transition: 0.3s; }
        .selected { background: var(--p); transform: scale(1.05); }
        .next-btn { background: var(--g); color: black; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; margin-top: 20px; display: none; cursor: pointer; }
        .yes-btn { background: #2ecc71; color: white; padding: 15px 40px; border-radius: 30px; border: none; margin: 10px; font-weight: bold; cursor: pointer; }
        .no-btn { background: #e74c3c; color: white; padding: 15px 40px; border-radius: 30px; border: none; margin: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <h1>Hi Nabisha... ✨</h1>
        <p>This is for you.</p>
        <div class="heart" onclick="showPage(2)"></div>
        <p style="margin-top: 40px;">START-ஐ அழுத்தவும்</p>
    </div>

    <div id="p2" class="page">
        <h2 id="qText"></h2>
        <div id="opts"></div>
        <button id="next" class="next-btn" onclick="nextQ()">அடுத்த கேள்வி →</button>
    </div>

    <div id="p3" class="page">
        <h1>நபிஷா... <br> உங்களுக்கு என்னை பிடிச்சிருக்கா? 🫣</h1>
        <div id="fBtns">
            <button class="yes-btn" onclick="done('Yes')">YES ❤️</button>
            <button class="no-btn" onclick="done('No')">NO 💔</button>
        </div>
        <h2 id="msg"></h2>
    </div>

    <script>
        const qs = [
            { q: "ஸ்கூல்ல என்னைப் பார்க்கும்போதெல்லாம் என்ன தோணுச்சு?", o: ["தொல்லை பண்றவன்னு தோணுச்சு! 😜", "அமைதியான பையன்னு தோணுச்சு.", "ஒண்ணுமே தோணாது."] },
            { q: "என்கிட்ட உனக்கு பிடிச்ச விஷயம்?", o: ["விடாமுயற்சி", "க்யூட்டான குணம்", "சீக்ரெட்! 🤐"] },
            { q: "அடுத்து மீட் பண்ணும்போது என்ன வாங்கிட்டு வரணும்?", o: ["சாக்லேட்", "ரோஜாப் பூ", "உன் சிரிப்பு போதும்! ❤️"] },
            { q: "நீ ஏன் என்கிட்ட பேசாம இருக்க?", o: ["பயமா இருக்கு", "விருப்பம் இல்லை", "அப்புறம் பேசுவோம்"] }
        ];
        
        let cur = 0, ans = [], sel = [];

        // Public Key - Correct
        emailjs.init("uqurIOJ3nxZm_DIWY");

        function showPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + n).classList.add('active');
            if(n === 2) loadQ();
        }

        function loadQ() {
            sel = [];
            document.getElementById('next').style.display = 'none';
            document.getElementById('qText').innerText = qs[cur].q;
            const div = document.getElementById('opts');
            div.innerHTML = '';
            qs[cur].o.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = o;
                b.onclick = () => {
                    b.classList.toggle('selected');
                    if(b.classList.contains('selected')) sel.push(o);
                    else sel = sel.filter(i => i !== o);
                    document.getElementById('next').style.display = sel.length > 0 ? 'block' : 'none';
                };
                div.appendChild(b);
            });
        }

        function nextQ() {
            ans.push(qs[cur].q + ": " + sel.join(", "));
            cur++;
            if(cur < qs.length) loadQ();
            else showPage(3);
        }

        function done(c) {
            ans.push("Final Answer: " + c);
            document.getElementById('fBtns').style.display = 'none';

            // EmailJS Send with your NEW Template ID
            emailjs.send("service_g8uqvti", "template_9jrfxta", {
                name: "Nabisha",
                email: "nabisha@test.com",
                message: ans.join("\n")
            }).then(
                function() { alert("Success! மெயில் அனுப்பப்பட்டது."); },
                function(err) { alert("Error: " + JSON.stringify(err)); }
            );

            document.getElementById('msg').innerText = c === 'Yes' ? "சந்தோஷம்! ❤️" : "சரிங்க! ✨";
            if(c === 'Yes') confetti();
        }
    </script>
</body>
</html>
